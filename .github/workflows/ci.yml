name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    # Note: no postgres/redis service containers yet. Current pytest uses
    # stubbed health checks and passes with no real DB. Add
    # `services: { postgres: ..., redis: ... }` here when real DB-backed
    # tests land.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync

      - name: ruff check
        run: uv run ruff check app tests

      - name: ruff format --check
        run: uv run ruff format --check app tests

      - name: mypy
        run: uv run mypy app

      - name: pytest
        run: uv run pytest -q

  frontend:
    name: frontend (typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm --filter web typecheck

      - name: lint
        run: pnpm --filter web lint

      - name: build
        run: pnpm --filter web build
