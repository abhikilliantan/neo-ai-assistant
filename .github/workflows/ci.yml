name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    # uv workspace lives at repo root; sync from root so both members
    # (apps/api + packages/py-shared) resolve. Checks run with
    # `--package neo-api` so they use the workspace venv but scope to
    # the api member.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: neo
          POSTGRES_PASSWORD: neo
          POSTGRES_DB: neo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neo -d neo"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # Tests use metadata create_all + inline RBAC seed against this DB.
      TEST_DATABASE_URL: postgresql+asyncpg://neo:neo@localhost:5432/neo
      TEST_ADMIN_DSN: postgres://neo:neo@localhost:5432/postgres
      # App-level default (unused by tests; kept for parity).
      DATABASE_URL: postgresql+asyncpg://neo:neo@localhost:5432/neo
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --package neo-api

      - name: ruff check
        run: uv run --package neo-api ruff check app tests
        working-directory: apps/api

      - name: ruff format --check
        run: uv run --package neo-api ruff format --check app tests
        working-directory: apps/api

      - name: mypy
        run: uv run --package neo-api mypy app
        working-directory: apps/api

      - name: pytest
        run: uv run --package neo-api pytest -q
        working-directory: apps/api

  frontend:
    name: frontend (typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm --filter web typecheck

      - name: lint
        run: pnpm --filter web lint

      - name: build
        run: pnpm --filter web build
